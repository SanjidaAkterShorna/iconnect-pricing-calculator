<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="icon-dark.png">
<title>iConnect – Page Not Found</title>
<style>
  :root,[data-theme="dark"]{--bg:#08080f;--card:#13131e;--border:#252538;--text:#eeeeff;--text2:#9898bb;--muted:#555570;--accent:#7c5cfc;--accent-lt:#a07fff;--gradient:linear-gradient(135deg,#7c5cfc 0%,#00d4ff 100%);}
  [data-theme="light"]{--bg:#f5f3fa;--card:#ffffff;--border:#e0d8f0;--text:#1c1535;--text2:#44396a;--muted:#7a6fa0;--accent:#6c3ce0;--accent-lt:#7c4ff0;--gradient:linear-gradient(135deg,#6c3ce0 0%,#0080c0 100%);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .code{font-size:8rem;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
  h1{font-size:1.5rem;font-weight:700;margin:16px 0 8px;}
  p{color:var(--text2);font-size:1rem;margin-bottom:32px;}
  a{display:inline-block;padding:14px 32px;background:var(--gradient);color:#fff;border-radius:10px;text-decoration:none;font-weight:700;font-size:0.95rem;transition:all .2s;}
  a:hover{transform:translateY(-2px);}
</style>
</head>
<body>
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="pricing.html">Go to Pricing</a>
<script>
(function(){
  const s=localStorage.getItem('theme')||'dark';
  document.documentElement.setAttribute('data-theme',s);
  const fav=document.querySelector('link[rel="icon"]');
  if(fav)fav.href=s==='dark'?'icon-dark.png':'icon-light.png';
})();
</script>
</body>
</html>
